<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css?v=20260421">
<style>
  body{margin:0;padding:20px;box-sizing:border-box;background:var(--bg-marketing);overflow:hidden}
  .card{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;gap:10px}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--fg-4)}
  .weights{display:grid;grid-template-columns:80px 1fr auto;gap:10px 18px;align-items:baseline}
  .w-name{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
  .w-num{font-family:var(--font-mono);font-size:11px;color:var(--fg-4);text-align:right}
  .w-sample{font-size:22px;letter-spacing:-0.3px}
</style>
</head><body>
<div class="card">
  <div class="weights">
    <div class="w-name">Light</div><div class="w-sample" style="font-weight:300;color:var(--fg-2)">Plan the work</div><div class="w-num">300</div>
    <div class="w-name">Regular</div><div class="w-sample" style="font-weight:400;color:var(--fg-1)">Plan the work</div><div class="w-num">400</div>
    <div class="w-name">Medium</div><div class="w-sample" style="font-weight:510;color:var(--fg-1)">Plan the work</div><div class="w-num">510 ★</div>
    <div class="w-name">Semibold</div><div class="w-sample" style="font-weight:590;color:var(--fg-1)">Plan the work</div><div class="w-num">590</div>
  </div>
  <div class="spec">510 is the signature — between regular and medium. Use it as the default emphasis weight.</div>
</div>
<script src="../theme-toggle.js"></script>
</body></html>
