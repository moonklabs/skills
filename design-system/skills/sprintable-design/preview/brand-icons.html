<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css?v=20260421">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body{margin:0;padding:24px;box-sizing:border-box;background:var(--bg-marketing);overflow:hidden;display:grid;grid-template-columns:repeat(8,1fr);gap:14px;align-items:center;justify-items:center}
  .ic{color:var(--fg-2);display:flex;flex-direction:column;align-items:center;gap:6px}
  .ic svg{width:18px;height:18px;stroke-width:1.5}
  .lbl{font-family:var(--font-mono);font-size:9px;color:var(--fg-4)}
</style>
</head><body>
  <div class="ic"><i data-lucide="search"></i><span class="lbl">search</span></div>
  <div class="ic"><i data-lucide="inbox"></i><span class="lbl">inbox</span></div>
  <div class="ic"><i data-lucide="calendar"></i><span class="lbl">calendar</span></div>
  <div class="ic"><i data-lucide="git-branch"></i><span class="lbl">branch</span></div>
  <div class="ic"><i data-lucide="check-circle-2"></i><span class="lbl">check</span></div>
  <div class="ic"><i data-lucide="filter"></i><span class="lbl">filter</span></div>
  <div class="ic"><i data-lucide="settings"></i><span class="lbl">settings</span></div>
  <div class="ic"><i data-lucide="user"></i><span class="lbl">user</span></div>
<script>lucide.createIcons();</script>
<script src="../theme-toggle.js"></script>
</body></html>
