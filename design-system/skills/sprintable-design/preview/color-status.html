<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css?v=20260421">
<style>
  body{margin:0;padding:20px;box-sizing:border-box;background:var(--bg-marketing);overflow:hidden}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;height:100%}
  .sw{border-radius:var(--radius-md);border:1px solid var(--border-subtle);background:var(--surface-alpha-1);padding:12px;display:flex;flex-direction:column;justify-content:space-between;gap:12px}
  .dot{width:14px;height:14px;border-radius:50%}
  .label{font-size:11px;color:var(--fg-2);font-weight:510}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-4)}
  .top{display:flex;align-items:center;gap:8px}
</style>
</head><body>
<div class="grid">
  <div class="sw"><div class="top"><div class="dot" style="background:#27a644"></div><div class="label">Success</div></div><div class="hex">#27a644</div></div>
  <div class="sw"><div class="top"><div class="dot" style="background:#10b981"></div><div class="label">Emerald</div></div><div class="hex">#10b981</div></div>
  <div class="sw"><div class="top"><div class="dot" style="background:#f5a623"></div><div class="label">Warning</div></div><div class="hex">#f5a623</div></div>
  <div class="sw"><div class="top"><div class="dot" style="background:#ef4444"></div><div class="label">Danger</div></div><div class="hex">#ef4444</div></div>
</div>
<script src="../theme-toggle.js"></script>
</body></html>
