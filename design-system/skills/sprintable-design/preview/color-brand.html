<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css?v=20260421">
<style>
  body{margin:0;padding:20px;box-sizing:border-box;background:var(--bg-marketing);overflow:hidden}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;height:100%}
  .sw{border-radius:var(--radius-md);padding:12px;display:flex;flex-direction:column;justify-content:flex-end;gap:4px;min-height:96px;border:1px solid var(--border-subtle)}
  .hex{font-family:var(--font-mono);font-size:10px;color:#fff;opacity:.85}
  .nm{font-size:11px;color:#fff;font-weight:590;letter-spacing:-0.1px}
</style>
</head><body>
<div class="grid">
  <div class="sw" style="background:#0059a5"><div class="nm">Deep</div><div class="hex">#0059a5</div></div>
  <div class="sw" style="background:#3385f8"><div class="nm">Primary</div><div class="hex">#3385f8</div></div>
  <div class="sw" style="background:#71aefe"><div class="nm" style="color:#08090a">Light</div><div class="hex" style="color:#08090a">#71aefe</div></div>
  <div class="sw" style="background:#a8cbfe"><div class="nm" style="color:#08090a">Soft</div><div class="hex" style="color:#08090a">#a8cbfe</div></div>
</div>
<script src="../theme-toggle.js"></script>
</body></html>
