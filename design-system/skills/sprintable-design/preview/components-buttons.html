<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css?v=20260421">
<style>
  body{margin:0;padding:24px;box-sizing:border-box;background:var(--bg-marketing);overflow:hidden;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .btn{font:inherit;font-family:var(--font-sans);font-feature-settings:"cv01","ss03";font-weight:510;font-size:14px;border-radius:6px;padding:8px 16px;cursor:pointer;transition:all 120ms cubic-bezier(.2,0,0,1);border:none}
  .primary{background:var(--brand-primary);color:var(--fg-inverse)}
  .primary:hover{background:var(--accent-hover)}
  .ghost{background:var(--surface-alpha-1);color:var(--fg-1);border:1px solid var(--border-default)}
  .ghost:hover{background:var(--surface-alpha-3)}
  .subtle{background:var(--surface-alpha-2);color:var(--fg-2);border:1px solid transparent;padding:6px 10px;font-size:13px}
  .subtle:hover{background:var(--surface-alpha-3)}
  .icon{width:32px;height:32px;padding:0;border-radius:50%;background:var(--surface-alpha-2);border:1px solid var(--border-default);color:var(--fg-1);display:inline-flex;align-items:center;justify-content:center}
</style>
</head><body>
  <button class="btn primary">Start sprint</button>
  <button class="btn ghost">Cancel</button>
  <button class="btn subtle">Filter</button>
  <button class="btn icon">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
  </button>
<script src="../theme-toggle.js"></script>
</body></html>
